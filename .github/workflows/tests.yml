# Los tests de CI solo se ejecutan en pbstudio-legacy (repo de desarrollo).
# Este repo (pbstudio-deploy) no contiene vendor/, tests/ ni base de datos de test.
name: Tests CI (deshabilitado en deploy repo)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo del disparo manual (solo auditoria)'
        required: false
        default: inspeccion manual

jobs:
  noop:
    name: Tests deshabilitados en este repo
    runs-on: ubuntu-latest
    steps:
      - name: Aviso
        run: |
          echo 'Los smoke tests solo se ejecutan en pbstudio-legacy.'
          echo 'Este repo no contiene vendor/, tests/ ni .env de test.'
